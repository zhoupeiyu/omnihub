<!DOCTYPE html>
<html lang="zh" data-skin="minimal" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>万象台 OmniHub</title>
<style>
/* ============================================================
   万象台 OmniHub v2 — 沿用 v1 的 4 皮肤 × 2 主题设计令牌
   功能与交互参考 resource-nav：顶栏搜索 / 分类分区 / favicon /
   计数徽章 / 悬停反馈 / 回到顶部
   ============================================================ */

/* ---------- 皮肤 1：极简清爽 minimal ---------- */
:root, [data-skin="minimal"] {
  --font-display: -apple-system, "SF Pro Display", "PingFang SC", "Noto Sans SC", sans-serif;
  --font-body: -apple-system, "SF Pro Text", "PingFang SC", "Noto Sans SC", sans-serif;
  --font-mono: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
  --display-weight: 650;
  --radius-sm: 8px; --radius: 12px; --radius-lg: 16px;
  --border-w: 1px;
  --bg: oklch(99% 0.002 250);
  --bg-sunken: oklch(96.5% 0.004 250);
  --surface: oklch(100% 0 0);
  --raised: oklch(100% 0 0);
  --text: oklch(20% 0.01 250);
  --text-2: oklch(45% 0.015 250);
  --text-3: oklch(62% 0.012 250);
  --border: oklch(91% 0.005 250);
  --accent: oklch(55% 0.21 258);
  --accent-soft: oklch(95% 0.03 258);
  --accent-contrast: #fff;
  --shadow-card: 0 1px 2px oklch(0% 0 0 / .04), 0 4px 16px oklch(0% 0 0 / .05);
  --shadow-pop: 0 4px 12px oklch(0% 0 0 / .08), 0 16px 48px oklch(0% 0 0 / .12);
  --sidebar-bg: oklch(97.5% 0.003 250);
  --glass: none;
}
[data-skin="minimal"][data-theme="dark"] {
  --bg: oklch(18% 0.008 255);
  --bg-sunken: oklch(15% 0.008 255);
  --surface: oklch(22% 0.01 255);
  --raised: oklch(26% 0.012 255);
  --text: oklch(94% 0.005 250);
  --text-2: oklch(72% 0.01 250);
  --text-3: oklch(55% 0.01 250);
  --border: oklch(30% 0.01 255);
  --accent: oklch(68% 0.18 258);
  --accent-soft: oklch(30% 0.06 258);
  --accent-contrast: oklch(15% 0.02 258);
  --shadow-card: 0 1px 2px oklch(0% 0 0 / .3), 0 4px 16px oklch(0% 0 0 / .25);
  --shadow-pop: 0 4px 12px oklch(0% 0 0 / .4), 0 16px 48px oklch(0% 0 0 / .5);
  --sidebar-bg: oklch(16% 0.008 255);
}

/* ---------- 皮肤 2：深色科技 tech ---------- */
[data-skin="tech"] {
  --font-display: "SF Pro Display", -apple-system, "PingFang SC", sans-serif;
  --font-body: -apple-system, "SF Pro Text", "PingFang SC", sans-serif;
  --font-mono: "SF Mono", ui-monospace, Menlo, monospace;
  --display-weight: 600;
  --radius-sm: 6px; --radius: 10px; --radius-lg: 14px;
  --border-w: 1px;
  --bg: oklch(96% 0.008 270);
  --bg-sunken: oklch(93% 0.01 270);
  --surface: oklch(99% 0.004 270 / .72);
  --raised: oklch(100% 0 0 / .85);
  --text: oklch(22% 0.03 275);
  --text-2: oklch(46% 0.03 275);
  --text-3: oklch(62% 0.025 275);
  --border: oklch(86% 0.015 270);
  --accent: oklch(56% 0.23 285);
  --accent-soft: oklch(93% 0.04 285);
  --accent-contrast: #fff;
  --shadow-card: 0 1px 3px oklch(30% 0.1 285 / .08), 0 8px 24px oklch(30% 0.1 285 / .08);
  --shadow-pop: 0 8px 32px oklch(30% 0.12 285 / .2);
  --sidebar-bg: oklch(98% 0.005 270 / .6);
  --glass: blur(20px) saturate(1.4);
}
[data-skin="tech"][data-theme="dark"] {
  --bg: oklch(14% 0.025 275);
  --bg-sunken: oklch(11% 0.02 275);
  --surface: oklch(20% 0.03 275 / .65);
  --raised: oklch(25% 0.035 275 / .8);
  --text: oklch(95% 0.01 280);
  --text-2: oklch(72% 0.03 280);
  --text-3: oklch(54% 0.04 280);
  --border: oklch(32% 0.04 278 / .7);
  --accent: oklch(72% 0.19 295);
  --accent-soft: oklch(32% 0.09 295 / .6);
  --accent-contrast: oklch(13% 0.04 295);
  --shadow-card: 0 1px 2px oklch(0% 0 0 / .4), 0 8px 32px oklch(60% 0.2 295 / .07);
  --shadow-pop: 0 8px 40px oklch(0% 0 0 / .6), 0 0 80px oklch(60% 0.2 295 / .12);
  --sidebar-bg: oklch(16% 0.028 275 / .55);
}

/* ---------- 皮肤 3：温暖杂志 warm ---------- */
[data-skin="warm"] {
  --font-display: "Songti SC", "Noto Serif SC", Georgia, serif;
  --font-body: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
  --font-mono: "SF Mono", ui-monospace, Menlo, monospace;
  --display-weight: 700;
  --radius-sm: 10px; --radius: 14px; --radius-lg: 20px;
  --border-w: 1px;
  --bg: oklch(96.5% 0.015 85);
  --bg-sunken: oklch(93.5% 0.02 85);
  --surface: oklch(98.5% 0.01 90);
  --raised: oklch(99.5% 0.006 90);
  --text: oklch(28% 0.03 60);
  --text-2: oklch(48% 0.035 60);
  --text-3: oklch(62% 0.03 65);
  --border: oklch(87% 0.025 80);
  --accent: oklch(56% 0.15 45);
  --accent-soft: oklch(93% 0.04 50);
  --accent-contrast: oklch(98% 0.01 80);
  --shadow-card: 0 1px 2px oklch(40% 0.05 60 / .06), 0 6px 20px oklch(40% 0.05 60 / .08);
  --shadow-pop: 0 8px 32px oklch(35% 0.06 55 / .18);
  --sidebar-bg: oklch(94.5% 0.018 85);
  --glass: none;
}
[data-skin="warm"][data-theme="dark"] {
  --bg: oklch(21% 0.018 60);
  --bg-sunken: oklch(18% 0.015 60);
  --surface: oklch(25% 0.02 62);
  --raised: oklch(29% 0.022 62);
  --text: oklch(92% 0.02 85);
  --text-2: oklch(72% 0.03 80);
  --text-3: oklch(56% 0.03 75);
  --border: oklch(33% 0.025 65);
  --accent: oklch(72% 0.13 55);
  --accent-soft: oklch(33% 0.05 50);
  --accent-contrast: oklch(20% 0.03 55);
  --shadow-card: 0 1px 2px oklch(0% 0 0 / .3), 0 6px 20px oklch(0% 0 0 / .25);
  --shadow-pop: 0 8px 32px oklch(0% 0 0 / .45);
  --sidebar-bg: oklch(19% 0.016 60);
}

/* ---------- 皮肤 4：活泼多彩 playful ---------- */
[data-skin="playful"] {
  --font-display: -apple-system, "SF Pro Rounded", "PingFang SC", "Noto Sans SC", sans-serif;
  --font-body: -apple-system, "SF Pro Rounded", "PingFang SC", "Noto Sans SC", sans-serif;
  --font-mono: "SF Mono", ui-monospace, Menlo, monospace;
  --display-weight: 800;
  --radius-sm: 12px; --radius: 18px; --radius-lg: 24px;
  --border-w: 2px;
  --bg: oklch(96% 0.03 95);
  --bg-sunken: oklch(92.5% 0.04 95);
  --surface: oklch(99.5% 0.005 95);
  --raised: oklch(100% 0 0);
  --text: oklch(25% 0.04 290);
  --text-2: oklch(45% 0.05 290);
  --text-3: oklch(60% 0.04 290);
  --border: oklch(30% 0.04 290);
  --accent: oklch(62% 0.21 25);
  --accent-soft: oklch(92% 0.06 25);
  --accent-contrast: #fff;
  --shadow-card: 3px 3px 0 oklch(30% 0.04 290);
  --shadow-pop: 6px 6px 0 oklch(30% 0.04 290);
  --sidebar-bg: oklch(93% 0.05 160);
  --glass: none;
}
[data-skin="playful"][data-theme="dark"] {
  --bg: oklch(22% 0.04 290);
  --bg-sunken: oklch(18% 0.035 290);
  --surface: oklch(28% 0.05 290);
  --raised: oklch(33% 0.055 290);
  --text: oklch(96% 0.01 95);
  --text-2: oklch(76% 0.04 95);
  --text-3: oklch(58% 0.04 290);
  --border: oklch(60% 0.1 95);
  --accent: oklch(75% 0.17 80);
  --accent-soft: oklch(35% 0.07 80);
  --accent-contrast: oklch(22% 0.06 80);
  --shadow-card: 3px 3px 0 oklch(60% 0.1 95 / .7);
  --shadow-pop: 6px 6px 0 oklch(60% 0.1 95 / .7);
  --sidebar-bg: oklch(19% 0.045 310);
}

/* ============================================================
   基础
   ============================================================ */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  transition: background .35s ease, color .35s ease;
}
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }
section[id] { scroll-margin-top: 84px; }
::selection { background: var(--accent-soft); }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; border: 2px solid var(--bg); }
::-webkit-scrollbar-track { background: transparent; }

/* ---------- 顶栏（含全局搜索） ---------- */
.header-bar {
  position: sticky; top: 0; z-index: 40;
  background: var(--sidebar-bg);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  border-bottom: var(--border-w) solid var(--border);
  transition: background .35s ease;
}
.header-inner { width: 100%; height: 50px; display: flex; align-items: center; gap: 12px; padding: 0 20px; }
.logo-mark {
  width: 30px; height: 30px; border-radius: var(--radius-sm); flex-shrink: 0;
  background: var(--accent); color: var(--accent-contrast);
  display: grid; place-items: center;
  font-family: var(--font-display); font-weight: 800; font-size: 15px;
  box-shadow: var(--shadow-card);
}
.brand-title { font-family: var(--font-display); font-weight: var(--display-weight); font-size: 15.5px; white-space: nowrap; }
.brand-sub { display: none; }

.header-greet { display: flex; flex-direction: column; margin-left: 12px; min-width: 0; line-height: 1.45; }
.greet-main { font-size: 12.5px; font-weight: 650; color: var(--text-2); white-space: nowrap; }
.greet-sub { font-size: 10.5px; color: var(--text-3); white-space: nowrap; font-variant-numeric: tabular-nums; }

.search-wrap { position: relative; margin-left: auto; width: min(320px, 32vw); }
.search-wrap > svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-3); pointer-events: none; }
.search-input {
  width: 100%; border-radius: 99px; padding: 6px 16px 6px 35px; font-size: 13px;
  border: var(--border-w) solid var(--border); background: var(--surface); color: var(--text);
  outline: none; transition: border-color .2s, box-shadow .2s;
}
.search-input::placeholder { color: var(--text-3); }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

.header-actions { display: flex; gap: 8px; flex-shrink: 0; position: relative; }

/* ---------- 通用控件（与 v1 一致） ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 13px; border-radius: var(--radius-sm);
  border: var(--border-w) solid var(--border);
  background: var(--surface); color: var(--text);
  font-size: 13px; font-weight: 600;
  transition: all .18s ease;
}
.btn:hover { box-shadow: var(--shadow-card); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn svg { width: 14px; height: 14px; }
.btn-primary { background: var(--accent); color: var(--accent-contrast); border-color: transparent; }
[data-skin="playful"] .btn-primary { border-color: var(--border); }
.btn-icon { padding: 6px; }
.btn-ghost { border-color: transparent; background: transparent; color: var(--text-2); }
.btn-ghost:hover { background: var(--surface); box-shadow: none; }

.input, .select {
  padding: 9px 13px; border-radius: var(--radius-sm);
  border: var(--border-w) solid var(--border);
  background: var(--surface); color: var(--text);
  font-size: 14px; width: 100%;
  outline: none; transition: border-color .18s ease, box-shadow .18s ease;
}
.input:focus, .select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.input::placeholder { color: var(--text-3); }

/* ---------- 布局：侧边栏 + 主区 ---------- */
.layout { width: 100%; display: flex; }
.sidebar {
  position: sticky; top: 50px; height: calc(100vh - 50px); width: 196px; flex-shrink: 0;
  background: var(--sidebar-bg);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  border-right: var(--border-w) solid var(--border);
  padding: 12px 10px; overflow-y: auto;
  transition: background .35s ease;
  display: flex; flex-direction: column;
}
.sidebar-foot {
  margin-top: auto; position: relative;
  padding-top: 10px; border-top: var(--border-w) solid var(--border);
  display: flex; flex-direction: column; gap: 2px;
}
.user-strip {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 8px 4px; min-width: 0;
}
.user-avatar {
  width: 27px; height: 27px; border-radius: 50%; flex-shrink: 0;
  background: var(--accent); color: var(--accent-contrast);
  display: grid; place-items: center;
  font-family: var(--font-display); font-size: 13px; font-weight: 700;
}
.user-name {
  flex: 1; min-width: 0; font-size: 13px; font-weight: 650; color: var(--text-2);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.strip-btn {
  width: 27px; height: 27px; border-radius: 8px; flex-shrink: 0;
  display: grid; place-items: center;
  border: none; background: transparent; color: var(--text-3);
  transition: background .15s ease, color .15s ease;
}
.strip-btn:hover, .strip-btn.open { background: var(--bg-sunken); color: var(--accent); }
.strip-btn svg { width: 15px; height: 15px; }
.menu-divider { height: var(--border-w); background: var(--border); margin: 6px 4px; }
.skin-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; font-size: 13px; font-weight: 600; color: var(--text-2);
}
.skin-row > svg { width: 15px; height: 15px; flex-shrink: 0; }
.menu-right { margin-left: auto; display: flex; align-items: center; gap: 7px; }
.skin-dot-btn {
  width: 17px; height: 17px; border-radius: 50%; flex-shrink: 0;
  border: var(--border-w) solid var(--border); cursor: pointer; padding: 0;
  transition: transform .15s ease, box-shadow .15s ease;
}
.skin-dot-btn:hover { transform: scale(1.18); }
.skin-dot-btn.active {
  box-shadow: 0 0 0 2px var(--raised), 0 0 0 3.5px var(--accent);
  border-color: transparent;
}
.mini-switch {
  width: 32px; height: 19px; border-radius: 99px; flex-shrink: 0;
  background: var(--bg-sunken); border: var(--border-w) solid var(--border);
  position: relative; transition: background .2s ease, border-color .2s ease;
}
.mini-switch::after {
  content: ""; position: absolute; top: 2px; left: 2px;
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--text-3);
  transition: left .2s ease, background .2s ease;
}
.mini-switch.on { background: var(--accent); border-color: var(--accent); }
.mini-switch.on::after { left: 15px; background: var(--accent-contrast); }
.side-label { font-size: 10.5px; font-weight: 700; letter-spacing: .14em; color: var(--text-3); padding: 0 10px; margin: 12px 0 5px; }
.side-label:first-child { margin-top: 0; }
.nav-item {
  display: flex; align-items: center; gap: 9px; width: 100%;
  padding: 6px 10px; border-radius: var(--radius-sm);
  border: var(--border-w) solid transparent;
  background: transparent; color: var(--text-2);
  font-size: 13.5px; font-weight: 500; text-align: left;
  transition: all .18s ease; margin-bottom: 1px;
}
.nav-item:hover { background: var(--surface); color: var(--text); }
.nav-item.active {
  background: var(--surface); color: var(--accent);
  border-color: var(--border); box-shadow: var(--shadow-card);
  font-weight: 650;
}
.nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
.nav-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--text-3); transition: background .18s; }
.nav-item.active .nav-dot, .nav-item:hover .nav-dot { background: var(--accent); }
.nav-count { margin-left: auto; font-size: 11.5px; color: var(--text-3); font-variant-numeric: tabular-nums; }

.main { min-width: 0; flex: 1; padding: 14px 20px 48px; }

/* ---------- 区块标题（计数徽章 + 操作按钮） ---------- */
.section-head { display: flex; align-items: center; gap: 9px; margin: 0 0 10px; }
.section-title { font-family: var(--font-display); font-weight: var(--display-weight); font-size: 15px; display: flex; align-items: center; gap: 7px; }
.section-title svg { width: 15px; height: 15px; color: var(--accent); }
.badge-count {
  border-radius: 99px; border: var(--border-w) solid var(--border); background: var(--bg-sunken);
  color: var(--text-3); padding: 0 9px; font-size: 11.5px; font-weight: 600;
}
.section-actions { margin-left: auto; display: flex; gap: 8px; }

/* ---------- 收藏卡片（favicon + 名称 + 描述） ---------- */
.fav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(186px, 1fr)); gap: 9px; margin-bottom: 18px; }
.fav-card {
  position: relative; display: flex; align-items: center; gap: 10px;
  padding: 9px 11px; border-radius: var(--radius-sm);
  border: var(--border-w) solid var(--border);
  background: var(--surface); text-decoration: none; color: inherit;
  box-shadow: var(--shadow-card);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
}
.fav-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-pop); border-color: var(--accent); }
.fav-avatar {
  width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
  display: grid; place-items: center; overflow: hidden;
  font-family: var(--font-display); font-weight: 800; font-size: 13px; color: #fff;
  transition: transform .2s ease;
}
.fav-card:hover .fav-avatar { transform: scale(1.08); }
.fav-avatar img { width: 19px; height: 19px; border-radius: 4px; }
.fav-body { min-width: 0; flex: 1; }
.fav-name-row { display: flex; align-items: center; gap: 4px; }
.fav-name { font-weight: 650; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color .18s; }
.fav-card:hover .fav-name { color: var(--accent); }
.fav-arrow { width: 12px; height: 12px; flex-shrink: 0; color: var(--text-3); transition: transform .2s, color .2s; }
.fav-card:hover .fav-arrow { transform: translate(2px, -2px); color: var(--accent); }
.fav-desc {
  font-size: 11.5px; color: var(--text-3); line-height: 1.5;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.card-del, .card-edit {
  position: absolute; top: 8px; right: 8px; z-index: 2;
  width: 26px; height: 26px; border-radius: 8px;
  display: grid; place-items: center;
  border: none; background: var(--raised); color: var(--text-3);
  opacity: 0; transition: all .15s ease;
}
.card-edit { right: 38px; }
.fav-card:hover .card-del, .prompt-card:hover .card-del,
.fav-card:hover .card-edit, .prompt-card:hover .card-edit { opacity: 1; }
.card-del:hover { color: oklch(60% 0.22 25); background: var(--bg-sunken); }
.card-edit:hover { color: var(--accent); background: var(--bg-sunken); }
.card-del svg, .card-edit svg { width: 13px; height: 13px; }

.fav-add {
  display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 70px;
  border: var(--border-w) dashed var(--border); border-radius: var(--radius);
  background: transparent; color: var(--text-3); font-size: 13px; font-weight: 600;
  transition: all .18s ease;
}
.fav-add:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
.fav-add svg { width: 18px; height: 18px; }

/* ---------- 提示词工具栏（筛选 + 操作合并为一行） ---------- */
.prompt-toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.prompt-toolbar .toolbar-actions { margin-left: auto; display: flex; gap: 8px; flex-shrink: 0; }

/* ---------- 提示词卡片：等高网格 ---------- */
.prompt-group { margin-bottom: 18px; }
.prompt-group .section-head { margin-bottom: 8px; }
.prompt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(182px, 1fr)); gap: 10px; align-items: stretch; }
.prompt-card {
  position: relative; display: flex; flex-direction: column; cursor: pointer;
  border-radius: var(--radius); overflow: hidden;
  border: var(--border-w) solid var(--border);
  background: var(--surface); box-shadow: var(--shadow-card);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
}
.prompt-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-pop); border-color: var(--accent); }
.prompt-cover { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; display: block; background: var(--bg-sunken); }
.prompt-cover-placeholder {
  width: 100%; aspect-ratio: 4 / 3;
  display: grid; place-items: center;
  background: var(--accent-soft);
}
.prompt-cover-placeholder svg { width: 30px; height: 30px; color: var(--accent); }
.prompt-body { padding: 9px 11px 10px; display: flex; flex-direction: column; gap: 5px; flex: 1; }
.prompt-title {
  font-family: var(--font-display); font-weight: var(--display-weight); font-size: 13px; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
}
.prompt-text {
  font-size: 11.5px; color: var(--text-3); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  word-break: break-word; min-height: 2.6em;
}
.prompt-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: auto; padding-top: 2px; }
.prompt-actions { display: flex; gap: 6px; }
.tag-chip, .model-chip, .sns-chip { flex-shrink: 0; }
.tag-chip {
  border-radius: 99px; padding: 1px 9px; font-size: 11px; font-weight: 600;
  background: var(--accent-soft); color: var(--accent); white-space: nowrap;
}
.prompt-copy {
  flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  border: var(--border-w) solid var(--border); border-radius: 8px;
  padding: 5px 10px; font-size: 12px; font-weight: 600; white-space: nowrap;
  background: transparent; color: var(--text-2);
  transition: all .18s;
}
.prompt-copy:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
.prompt-copy svg { width: 13px; height: 13px; flex-shrink: 0; }

/* ---------- 信息流 ---------- */
.feed-sources { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.feed-source {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 13px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
  border: var(--border-w) solid var(--border); background: var(--surface); color: var(--text-2);
  transition: all .18s ease;
}
.feed-source:hover { color: var(--accent); border-color: var(--accent); }
.feed-source.active { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); }
[data-skin="playful"] .feed-source.active { border-color: var(--border); }
.feed-source .src-cat {
  font-size: 10px; font-weight: 700; padding: 0 6px; border-radius: 99px;
  background: var(--accent-soft); color: var(--accent);
}
.feed-source.active .src-cat { background: oklch(100% 0 0 / .25); color: var(--accent-contrast); }

.feed-layout { display: grid; grid-template-columns: 1fr 252px; gap: 12px; align-items: start; }
@media (max-width: 1020px) { .feed-layout { grid-template-columns: 1fr; } }
.feed-list { display: flex; flex-direction: column; gap: 7px; }
.feed-card {
  display: flex; gap: 11px; align-items: flex-start;
  padding: 11px 13px; border-radius: var(--radius-sm);
  border: var(--border-w) solid var(--border);
  background: var(--surface); box-shadow: var(--shadow-card);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  text-decoration: none; color: inherit;
}
.feed-card:hover { transform: translateX(3px); box-shadow: var(--shadow-pop); border-color: var(--accent); }
.feed-rank {
  font-family: var(--font-mono); font-size: 12.5px; font-weight: 700;
  color: var(--text-3); width: 20px; flex-shrink: 0; text-align: center; padding-top: 2px;
}
.feed-rank.hot { color: var(--accent); }
.feed-body { flex: 1; min-width: 0; }
.feed-title-row { display: flex; align-items: flex-start; gap: 8px; }
.feed-title { flex: 1; min-width: 0; font-weight: 600; font-size: 13.5px; line-height: 1.5; transition: color .18s; }
.feed-card:hover .feed-title { color: var(--accent); }
.feed-score {
  flex-shrink: 0; font-family: var(--font-mono); font-size: 10px; font-weight: 700;
  padding: 0 5px; border-radius: 5px; color: var(--text-3); line-height: 1.7;
  background: var(--bg-sunken); border: var(--border-w) solid var(--border);
}
.feed-score.selected { color: var(--accent); background: var(--accent-soft); border-color: transparent; }
.feed-pick {
  flex-shrink: 0; font-size: 9px; line-height: 1.9; padding: 0 4px;
  border-radius: 5px; white-space: nowrap;
  color: #fff; background: linear-gradient(135deg, #10b981, #059669);
}
/* 多标签 + 关联讨论 */
.feed-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; align-items: center; }
.feed-related {
  font-size: 11px; color: var(--text-3); padding: 1px 8px; border-radius: 6px; white-space: nowrap;
  border: var(--border-w) dashed var(--border);
}
/* 推荐理由框 */
.feed-reason {
  margin-top: 9px; padding: 8px 11px; font-size: 12px; line-height: 1.65;
  color: var(--text-2); background: var(--accent-soft);
  border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0;
}
.feed-reason-label {
  display: inline-block; font-weight: 700; color: var(--accent); margin-right: 6px; font-size: 11.5px;
}
.feed-origin {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 240px;
  font-size: 11px; color: var(--text-3); margin-left: auto; padding-left: 6px;
}

/* 时间线：按日期分组 */
.feed-day { margin-bottom: 4px; }
.feed-day + .feed-day { margin-top: 14px; }
.feed-day-label {
  font-size: 12px; font-weight: 700; color: var(--text-2);
  padding: 4px 2px 8px; position: sticky; top: 50px; z-index: 1;
  background: var(--bg);
}
.feed-day .feed-card { margin-bottom: 0; }

/* 时间线列：左侧大字时间 + 圆点 + 连续竖线，右侧卡片 */
.timeline { display: flex; flex-direction: column; }
.tl-row { display: grid; grid-template-columns: 46px 18px 1fr; column-gap: 4px; align-items: stretch; }
.tl-time {
  font-family: var(--font-mono); font-size: 13px; font-weight: 700;
  color: var(--text-2); text-align: right; padding: 13px 2px 0 0; white-space: nowrap;
}
.tl-rail { position: relative; display: flex; justify-content: center; }
.tl-rail::before {
  content: ""; position: absolute; top: 0; bottom: 0; left: 50%;
  width: 2px; transform: translateX(-50%); background: var(--border);
}
.tl-row:first-child .tl-rail::before { top: 17px; }
.tl-row:last-child .tl-rail::before { bottom: calc(100% - 17px); }
.tl-dot {
  position: relative; z-index: 1; margin-top: 13px;
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 0 3px var(--bg), 0 0 6px var(--accent);
}
.tl-row .feed-card { flex: 1; margin: 0 0 9px 4px; }
.tl-row:hover .tl-dot { box-shadow: 0 0 0 3px var(--bg), 0 0 10px var(--accent); }
@media (max-width: 560px) {
  .tl-row { grid-template-columns: 40px 14px 1fr; }
  .tl-time { font-size: 12px; }
}
.feed-summary {
  font-size: 12px; color: var(--text-3); line-height: 1.6; margin-top: 3px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.feed-meta { display: flex; gap: 8px; margin-top: 5px; font-size: 11px; color: var(--text-3); flex-wrap: wrap; align-items: center; }
.feed-heat { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); flex-shrink: 0; padding-top: 2px; }
.feed-side { display: flex; flex-direction: column; gap: 12px; }
.hot-card {
  padding: 14px 16px; border-radius: var(--radius);
  border: var(--border-w) solid var(--border);
  background: var(--surface); box-shadow: var(--shadow-card);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
}
.hot-title { font-family: var(--font-display); font-weight: var(--display-weight); font-size: 14px; margin-bottom: 10px; }
.hot-item {
  display: flex; align-items: flex-start; gap: 8px; padding: 7px 0;
  text-decoration: none; color: inherit; border-top: var(--border-w) solid var(--border);
}
.hot-item:first-of-type { border-top: none; }
.hot-rank {
  flex-shrink: 0; width: 17px; height: 17px; border-radius: 5px; margin-top: 1px;
  display: grid; place-items: center; font-size: 11px; font-weight: 700;
  background: var(--bg-sunken); color: var(--text-3);
}
.hot-rank.r1 { background: oklch(70% 0.18 30); color: #fff; }
.hot-rank.r2 { background: oklch(72% 0.13 50); color: #fff; }
.hot-rank.r3 { background: oklch(74% 0.10 70); color: #fff; }
.hot-text { flex: 1; min-width: 0; font-size: 12.5px; line-height: 1.5; transition: color .18s;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.hot-item:hover .hot-text { color: var(--accent); }
.hot-score { flex-shrink: 0; font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--accent); margin-top: 1px; }

.quote-card {
  padding: 14px 16px; border-radius: var(--radius);
  border: var(--border-w) solid var(--border);
  background: var(--surface); box-shadow: var(--shadow-card);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
}
.quote-mark { font-family: var(--font-display); font-size: 30px; line-height: 1; color: var(--accent); display: block; }
.quote-text { font-family: var(--font-display); font-size: 13.5px; line-height: 1.75; margin: 4px 0 8px; }
.quote-from { font-size: 11.5px; color: var(--text-3); text-align: right; }

/* ---------- 工具箱 ---------- */
.tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(285px, 1fr)); gap: 10px; }
.tool-card {
  padding: 13px 14px; border-radius: var(--radius-sm);
  border: var(--border-w) solid var(--border);
  background: var(--surface); box-shadow: var(--shadow-card);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  display: flex; flex-direction: column; gap: 10px;
  transition: box-shadow .2s ease, border-color .2s ease;
}
.tool-card:hover { box-shadow: var(--shadow-pop); }
.tool-head { display: flex; align-items: center; gap: 10px; }
.tool-head svg { width: 17px; height: 17px; color: var(--accent); }
.tool-head h3 { font-family: var(--font-display); font-weight: var(--display-weight); font-size: 15px; }
.tool-row { display: flex; gap: 8px; align-items: center; }
.tool-output {
  font-family: var(--font-mono); font-size: 13.5px;
  padding: 10px 13px; border-radius: var(--radius-sm);
  background: var(--bg-sunken); border: var(--border-w) solid var(--border);
  word-break: break-all; min-height: 42px;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  font-variant-numeric: tabular-nums;
}
.tool-label { font-size: 12px; color: var(--text-3); font-weight: 600; }
.range { accent-color: var(--accent); flex: 1; }
.stat-row { display: flex; gap: 9px; }
.stat-box {
  flex: 1; text-align: center; padding: 9px 6px;
  border-radius: var(--radius-sm); background: var(--bg-sunken);
  border: var(--border-w) solid var(--border);
}
.stat-num { font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--accent); }
.stat-lab { font-size: 11px; color: var(--text-3); margin-top: 1px; }
.color-swatch { width: 42px; height: 42px; border-radius: var(--radius-sm); border: var(--border-w) solid var(--border); flex-shrink: 0; }
.dice-result {
  font-family: var(--font-display); font-weight: var(--display-weight);
  font-size: 19px; text-align: center; padding: 16px 12px; min-height: 60px;
  border-radius: var(--radius-sm); background: var(--accent-soft); color: var(--accent);
  display: grid; place-items: center;
}

/* ---------- 弹窗 ---------- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: oklch(0% 0 0 / .4);
  display: grid; place-items: center; padding: 24px;
  animation: fadeIn .2s ease; overflow-y: auto;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
.modal {
  width: min(440px, 100%); max-height: calc(100vh - 80px); overflow-y: auto;
  background: var(--raised); border-radius: var(--radius-lg);
  border: var(--border-w) solid var(--border);
  box-shadow: var(--shadow-pop);
  padding: 24px;
  animation: popIn .25s cubic-bezier(.2,1.2,.4,1);
}
.modal.wide { width: min(600px, 100%); }
.modal h2 { font-family: var(--font-display); font-weight: var(--display-weight); font-size: 17px; margin-bottom: 16px; }
.form-field { margin-bottom: 14px; }
.form-field label { display: block; font-size: 12.5px; font-weight: 650; color: var(--text-2); margin-bottom: 6px; }
.form-hint { font-size: 11.5px; color: var(--text-3); margin-top: 4px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
.img-preview { width: 100%; max-height: 220px; object-fit: cover; border-radius: var(--radius-sm); border: var(--border-w) solid var(--border); display: block; }
.detail-cover { width: 100%; max-height: 320px; object-fit: cover; border-radius: var(--radius-sm); display: block; margin-bottom: 16px; }
.detail-text {
  font-size: 13.5px; line-height: 1.8; color: var(--text-2);
  background: var(--bg-sunken); border: var(--border-w) solid var(--border); border-radius: var(--radius-sm);
  padding: 14px 16px; white-space: pre-wrap; word-break: break-word;
}
@keyframes fadeIn { from { opacity: 0; } }
@keyframes popIn { from { opacity: 0; transform: scale(.93) translateY(8px); } }

/* ---------- 皮肤切换面板（侧边栏底部弹出） ---------- */
.skin-panel {
  position: absolute; bottom: 100%; left: 0; right: 0; z-index: 45; margin-bottom: 8px;
  background: var(--raised); border: var(--border-w) solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-pop);
  padding: 10px; animation: popIn .22s cubic-bezier(.2,1.2,.4,1);
}
.skin-option {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 8px 10px; border-radius: var(--radius-sm);
  border: var(--border-w) solid transparent; background: transparent;
  color: var(--text-2); font-size: 13px; font-weight: 600; text-align: left;
  transition: all .15s ease;
}
.skin-option:hover { background: var(--bg-sunken); color: var(--text); }
.skin-option.active { color: var(--accent); border-color: var(--border); background: var(--accent-soft); }
.skin-dot { width: 15px; height: 15px; border-radius: 50%; flex-shrink: 0; border: 2px solid var(--border); }

/* ---------- 灵感库：筛选栏 / 星标 / 徽章 ---------- */
.filter-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.filter-bar .select-mini {
  padding: 4px 26px 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600;
  border: var(--border-w) solid var(--border); background: var(--surface); color: var(--text-2);
  outline: none; appearance: auto; cursor: pointer;
}
.filter-chip {
  padding: 3px 11px; border-radius: 99px; font-size: 11.5px; font-weight: 600;
  border: var(--border-w) solid var(--border); background: transparent; color: var(--text-3);
  transition: all .15s;
}
.filter-chip:hover { color: var(--accent); border-color: var(--accent); }
.filter-chip.active { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); }
.star-btn {
  border: none; background: none; padding: 2px; display: grid; place-items: center;
  color: var(--text-3); transition: color .15s, transform .15s; cursor: pointer;
}
.star-btn:hover { transform: scale(1.2); color: oklch(75% 0.15 85); }
.star-btn.on { color: oklch(75% 0.15 85); }
.star-btn svg { width: 15px; height: 15px; }
.model-chip {
  border-radius: 5px; padding: 0 6px; font-size: 10.5px; font-weight: 700;
  background: var(--bg-sunken); border: var(--border-w) solid var(--border); color: var(--text-2);
  white-space: nowrap;
}
.sns-chip {
  border-radius: 5px; padding: 0 6px; font-size: 10.5px; font-weight: 700;
  background: var(--accent-soft); color: var(--accent); white-space: nowrap;
}
.archived-mask { opacity: .55; }

/* ---------- 抽屉（详情 / 编辑） ---------- */
.drawer-overlay {
  position: fixed; inset: 0; z-index: 50; background: oklch(0% 0 0 / .4);
  animation: fadeIn .2s ease;
  backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
}
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 51;
  width: min(540px, 100vw);
  background: var(--raised); border-left: var(--border-w) solid var(--border);
  box-shadow: var(--shadow-pop);
  display: flex; flex-direction: column;
  animation: drawerIn .25s cubic-bezier(.2, 1, .4, 1);
}
@keyframes drawerIn { from { transform: translateX(60px); opacity: 0; } }
.drawer-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px; border-bottom: var(--border-w) solid var(--border); flex-shrink: 0;
}
.drawer-head h2 { font-family: var(--font-display); font-weight: var(--display-weight); font-size: 15.5px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.drawer-body { flex: 1; overflow-y: auto; padding: 16px 18px 28px; }
.drawer-foot { display: flex; gap: 8px; padding: 12px 18px; border-top: var(--border-w) solid var(--border); flex-shrink: 0; }
.drawer-foot .spacer { margin-left: auto; }
.field-block { margin-bottom: 14px; }
.field-block label { display: block; font-size: 11.5px; font-weight: 700; color: var(--text-3); margin-bottom: 4px; letter-spacing: .04em; }
.field-text {
  font-size: 13px; line-height: 1.7; color: var(--text);
  background: var(--bg-sunken); border: var(--border-w) solid var(--border); border-radius: var(--radius-sm);
  padding: 9px 12px; white-space: pre-wrap; word-break: break-word;
}
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 14px; }
.sns-embed { width: 100%; aspect-ratio: 16 / 9; border: var(--border-w) solid var(--border); border-radius: var(--radius-sm); display: block; background: #000; }
.sns-link-card {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 12px; border-radius: var(--radius-sm);
  border: var(--border-w) solid var(--border); background: var(--bg-sunken);
  color: var(--text-2); font-size: 12.5px; text-decoration: none; word-break: break-all;
  transition: border-color .15s, color .15s;
}
.sns-link-card:hover { border-color: var(--accent); color: var(--accent); }
.sns-link-card svg { width: 14px; height: 14px; flex-shrink: 0; }
.tag-input-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }

/* ---------- Toast / 空状态 / 回到顶部 ---------- */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 60;
  padding: 10px 20px; border-radius: 99px;
  background: var(--text); color: var(--bg);
  font-size: 13px; font-weight: 600;
  box-shadow: var(--shadow-pop);
  display: flex; align-items: center; gap: 8px;
  animation: toastIn .3s cubic-bezier(.2,1.2,.4,1);
}
.toast svg { width: 14px; height: 14px; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(16px); } }

.empty-state {
  text-align: center; padding: 48px 20px;
  border: var(--border-w) dashed var(--border); border-radius: var(--radius);
}
.empty-state .empty-icon {
  width: 56px; height: 56px; margin: 0 auto 12px; border-radius: var(--radius);
  display: grid; place-items: center;
  background: var(--accent-soft); color: var(--accent);
}
.empty-state .empty-icon svg { width: 24px; height: 24px; }
.empty-state p { color: var(--text-3); font-size: 13.5px; }

.back-top {
  position: fixed; bottom: 24px; right: 24px; z-index: 45;
  width: 42px; height: 42px; border-radius: 99px;
  display: grid; place-items: center;
  background: var(--surface); border: var(--border-w) solid var(--border); color: var(--text-2);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  box-shadow: var(--shadow-pop);
  transition: opacity .3s, transform .3s;
}
.back-top:hover { transform: scale(1.08); color: var(--accent); }
.back-top.hidden { opacity: 0; pointer-events: none; transform: translateY(12px); }
.back-top svg { width: 18px; height: 18px; }

/* ---------- 登录 / 注册页 ---------- */
.auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
.auth-card {
  width: min(380px, 100%);
  background: var(--surface); border: var(--border-w) solid var(--border);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-pop);
  padding: 30px 28px;
}
.auth-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.auth-brand h1 { font-family: var(--font-display); font-weight: var(--display-weight); font-size: 22px; }
.auth-sub { color: var(--text-3); font-size: 13px; margin-bottom: 20px; }
.auth-tabs { display: flex; gap: 8px; margin-bottom: 18px; }
.auth-tab {
  flex: 1; padding: 8px; border-radius: var(--radius-sm); font-size: 13.5px; font-weight: 650;
  border: var(--border-w) solid var(--border); background: transparent; color: var(--text-2);
  transition: all .18s;
}
.auth-tab.active { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); }
.auth-error { color: oklch(58% 0.2 25); font-size: 13px; font-weight: 600; margin-top: 4px; }

/* ---------- AI 对话 ---------- */
.chat-shell {
  display: flex; flex-direction: column;
  height: calc(100vh - 50px - 14px - 38px - 24px);
  min-height: 420px;
  border: var(--border-w) solid var(--border); border-radius: var(--radius-lg);
  background: var(--surface); box-shadow: var(--shadow-card);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  overflow: hidden;
}
.chat-msgs { flex: 1; overflow-y: auto; padding: 22px 22px 10px; display: flex; flex-direction: column; gap: 14px; }
.msg-row { display: flex; }
.msg-row.user { justify-content: flex-end; }
.msg-bubble {
  max-width: 76%; padding: 10px 15px; border-radius: var(--radius);
  font-size: 14px; line-height: 1.75; white-space: pre-wrap; word-break: break-word;
}
.msg-row.user .msg-bubble { background: var(--accent); color: var(--accent-contrast); border-bottom-right-radius: 4px; }
.msg-row.assistant .msg-bubble {
  background: var(--bg-sunken); border: var(--border-w) solid var(--border);
  color: var(--text); border-bottom-left-radius: 4px;
}
.msg-bubble.thinking { color: var(--text-3); font-style: italic; }

/* ---------- AI 回复的 Markdown 排版 ---------- */
.md-body { white-space: normal; }
.md-body > :first-child { margin-top: 0; }
.md-body > :last-child { margin-bottom: 0; }
.md-body p { margin: 8px 0; }
.md-body h1, .md-body h2, .md-body h3, .md-body h4 {
  font-family: var(--font-display); font-weight: var(--display-weight);
  margin: 14px 0 6px; line-height: 1.4;
}
.md-body h1 { font-size: 17px; }
.md-body h2 { font-size: 16px; }
.md-body h3, .md-body h4 { font-size: 14.5px; }
.md-body ul, .md-body ol { margin: 8px 0; padding-left: 22px; }
.md-body li { margin: 3px 0; }
.md-body code {
  font-family: var(--font-mono); font-size: 12.5px;
  background: var(--bg-sunken); border: var(--border-w) solid var(--border);
  border-radius: 5px; padding: 1px 6px;
}
.md-body pre {
  background: var(--bg-sunken); border: var(--border-w) solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px; margin: 10px 0;
  overflow-x: auto;
}
.md-body pre code { background: none; border: none; padding: 0; font-size: 12.5px; line-height: 1.7; }
.md-body blockquote {
  margin: 10px 0; padding: 2px 0 2px 12px;
  border-left: 3px solid var(--accent); color: var(--text-2);
}
.md-body table { border-collapse: collapse; margin: 10px 0; font-size: 13px; }
.md-body th, .md-body td { border: var(--border-w) solid var(--border); padding: 5px 10px; }
.md-body th { background: var(--bg-sunken); font-weight: 650; }
.md-body a { color: var(--accent); }
.md-body hr { border: none; height: var(--border-w); background: var(--border); margin: 12px 0; }
.md-body img { max-width: 100%; border-radius: var(--radius-sm); }
.chat-empty { flex: 1; display: grid; place-items: center; text-align: center; color: var(--text-3); padding: 24px; }
.chat-empty .empty-icon {
  width: 56px; height: 56px; margin: 0 auto 12px; border-radius: var(--radius);
  display: grid; place-items: center; background: var(--accent-soft); color: var(--accent);
}
.chat-empty .empty-icon svg { width: 26px; height: 26px; }
.chat-input-row {
  display: flex; gap: 10px; align-items: flex-end;
  padding: 14px 16px; border-top: var(--border-w) solid var(--border);
}
.chat-input {
  flex: 1; resize: none; max-height: 140px;
  padding: 10px 14px; border-radius: var(--radius);
  border: var(--border-w) solid var(--border); background: var(--bg-sunken); color: var(--text);
  font-size: 14px; line-height: 1.6; outline: none;
  transition: border-color .18s, box-shadow .18s;
}
.chat-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.chat-model-tag {
  font-size: 11.5px; color: var(--text-3); padding: 2px 10px;
  border: var(--border-w) solid var(--border); border-radius: 99px;
}

/* ---------- AI 设置预设 ---------- */
.preset-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.preset-chip {
  padding: 5px 13px; border-radius: 99px; font-size: 12.5px; font-weight: 600;
  border: var(--border-w) solid var(--border); background: transparent; color: var(--text-2);
  transition: all .18s;
}
.preset-chip:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }

/* ---------- 响应式 ---------- */
@media (max-width: 1000px) {
  .header-greet { display: none; }
}
@media (max-width: 860px) {
  .sidebar { display: none; }
  .main { padding: 20px 16px 48px; }
  .brand-title { font-size: 15px; }
  .brand-sub { display: none; }
  .search-wrap { width: 100%; }
}
</style>
