<!DOCTYPE html>
<html lang="zh" data-skin="minimal" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>万象台 OmniHub</title>
<style>
/* ============================================================
   万象台 OmniHub v2 — 沿用 v1 的 4 皮肤 × 2 主题设计令牌
   功能与交互参考 resource-nav：顶栏搜索 / 分类分区 / favicon /
   计数徽章 / 悬停反馈 / 回到顶部
   ============================================================ */

/* ---------- 皮肤 1：极简清爽 minimal ---------- */
:root, [data-skin="minimal"] {
  --font-display: -apple-system, "SF Pro Display", "PingFang SC", "Noto Sans SC", sans-serif;
  --font-body: -apple-system, "SF Pro Text", "PingFang SC", "Noto Sans SC", sans-serif;
  --font-mono: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
  --display-weight: 650;
  --radius-sm: 8px; --radius: 12px; --radius-lg: 16px;
  --border-w: 1px;
  --bg: oklch(99% 0.002 250);
  --bg-sunken: oklch(96.5% 0.004 250);
  --surface: oklch(100% 0 0);
  --raised: oklch(100% 0 0);
  --text: oklch(20% 0.01 250);
  --text-2: oklch(45% 0.015 250);
  --text-3: oklch(62% 0.012 250);
  --border: oklch(91% 0.005 250);
  --accent: oklch(55% 0.21 258);
  --accent-soft: oklch(95% 0.03 258);
  --accent-contrast: #fff;
  --shadow-card: 0 1px 2px oklch(0% 0 0 / .04), 0 4px 16px oklch(0% 0 0 / .05);
  --shadow-pop: 0 4px 12px oklch(0% 0 0 / .08), 0 16px 48px oklch(0% 0 0 / .12);
  --sidebar-bg: oklch(97.5% 0.003 250);
  --glass: none;
}
[data-skin="minimal"][data-theme="dark"] {
  --bg: oklch(18% 0.008 255);
  --bg-sunken: oklch(15% 0.008 255);
  --surface: oklch(22% 0.01 255);
  --raised: oklch(26% 0.012 255);
  --text: oklch(94% 0.005 250);
  --text-2: oklch(72% 0.01 250);
  --text-3: oklch(55% 0.01 250);
  --border: oklch(30% 0.01 255);
  --accent: oklch(68% 0.18 258);
  --accent-soft: oklch(30% 0.06 258);
  --accent-contrast: oklch(15% 0.02 258);
  --shadow-card: 0 1px 2px oklch(0% 0 0 / .3), 0 4px 16px oklch(0% 0 0 / .25);
  --shadow-pop: 0 4px 12px oklch(0% 0 0 / .4), 0 16px 48px oklch(0% 0 0 / .5);
  --sidebar-bg: oklch(16% 0.008 255);
}

/* ---------- 皮肤 2：深色科技 tech ---------- */
[data-skin="tech"] {
  --font-display: "SF Pro Display", -apple-system, "PingFang SC", sans-serif;
  --font-body: -apple-system, "SF Pro Text", "PingFang SC", sans-serif;
  --font-mono: "SF Mono", ui-monospace, Menlo, monospace;
  --display-weight: 600;
  --radius-sm: 6px; --radius: 10px; --radius-lg: 14px;
  --border-w: 1px;
  --bg: oklch(96% 0.008 270);
  --bg-sunken: oklch(93% 0.01 270);
  --surface: oklch(99% 0.004 270 / .72);
  --raised: oklch(100% 0 0 / .85);
  --text: oklch(22% 0.03 275);
  --text-2: oklch(46% 0.03 275);
  --text-3: oklch(62% 0.025 275);
  --border: oklch(86% 0.015 270);
  --accent: oklch(56% 0.23 285);
  --accent-soft: oklch(93% 0.04 285);
  --accent-contrast: #fff;
  --shadow-card: 0 1px 3px oklch(30% 0.1 285 / .08), 0 8px 24px oklch(30% 0.1 285 / .08);
  --shadow-pop: 0 8px 32px oklch(30% 0.12 285 / .2);
  --sidebar-bg: oklch(98% 0.005 270 / .6);
  --glass: blur(20px) saturate(1.4);
}
[data-skin="tech"][data-theme="dark"] {
  --bg: oklch(14% 0.025 275);
  --bg-sunken: oklch(11% 0.02 275);
  --surface: oklch(20% 0.03 275 / .65);
  --raised: oklch(25% 0.035 275 / .8);
  --text: oklch(95% 0.01 280);
  --text-2: oklch(72% 0.03 280);
  --text-3: oklch(54% 0.04 280);
  --border: oklch(32% 0.04 278 / .7);
  --accent: oklch(72% 0.19 295);
  --accent-soft: oklch(32% 0.09 295 / .6);
  --accent-contrast: oklch(13% 0.04 295);
  --shadow-card: 0 1px 2px oklch(0% 0 0 / .4), 0 8px 32px oklch(60% 0.2 295 / .07);
  --shadow-pop: 0 8px 40px oklch(0% 0 0 / .6), 0 0 80px oklch(60% 0.2 295 / .12);
  --sidebar-bg: oklch(16% 0.028 275 / .55);
}

/* ---------- 皮肤 3：温暖杂志 warm ---------- */
[data-skin="warm"] {
  --font-display: "Songti SC", "Noto Serif SC", Georgia, serif;
  --font-body: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
  --font-mono: "SF Mono", ui-monospace, Menlo, monospace;
  --display-weight: 700;
  --radius-sm: 10px; --radius: 14px; --radius-lg: 20px;
  --border-w: 1px;
  --bg: oklch(96.5% 0.015 85);
  --bg-sunken: oklch(93.5% 0.02 85);
  --surface: oklch(98.5% 0.01 90);
  --raised: oklch(99.5% 0.006 90);
  --text: oklch(28% 0.03 60);
  --text-2: oklch(48% 0.035 60);
  --text-3: oklch(62% 0.03 65);
  --border: oklch(87% 0.025 80);
  --accent: oklch(56% 0.15 45);
  --accent-soft: oklch(93% 0.04 50);
  --accent-contrast: oklch(98% 0.01 80);
  --shadow-card: 0 1px 2px oklch(40% 0.05 60 / .06), 0 6px 20px oklch(40% 0.05 60 / .08);
  --shadow-pop: 0 8px 32px oklch(35% 0.06 55 / .18);
  --sidebar-bg: oklch(94.5% 0.018 85);
  --glass: none;
}
[data-skin="warm"][data-theme="dark"] {
  --bg: oklch(21% 0.018 60);
  --bg-sunken: oklch(18% 0.015 60);
  --surface: oklch(25% 0.02 62);
  --raised: oklch(29% 0.022 62);
  --text: oklch(92% 0.02 85);
  --text-2: oklch(72% 0.03 80);
  --text-3: oklch(56% 0.03 75);
  --border: oklch(33% 0.025 65);
  --accent: oklch(72% 0.13 55);
  --accent-soft: oklch(33% 0.05 50);
  --accent-contrast: oklch(20% 0.03 55);
  --shadow-card: 0 1px 2px oklch(0% 0 0 / .3), 0 6px 20px oklch(0% 0 0 / .25);
  --shadow-pop: 0 8px 32px oklch(0% 0 0 / .45);
  --sidebar-bg: oklch(19% 0.016 60);
}

/* ---------- 皮肤 4：活泼多彩 playful ---------- */
[data-skin="playful"] {
  --font-display: -apple-system, "SF Pro Rounded", "PingFang SC", "Noto Sans SC", sans-serif;
  --font-body: -apple-system, "SF Pro Rounded", "PingFang SC", "Noto Sans SC", sans-serif;
  --font-mono: "SF Mono", ui-monospace, Menlo, monospace;
  --display-weight: 800;
  --radius-sm: 12px; --radius: 18px; --radius-lg: 24px;
  --border-w: 2px;
  --bg: oklch(96% 0.03 95);
  --bg-sunken: oklch(92.5% 0.04 95);
  --surface: oklch(99.5% 0.005 95);
  --raised: oklch(100% 0 0);
  --text: oklch(25% 0.04 290);
  --text-2: oklch(45% 0.05 290);
  --text-3: oklch(60% 0.04 290);
  --border: oklch(30% 0.04 290);
  --accent: oklch(62% 0.21 25);
  --accent-soft: oklch(92% 0.06 25);
  --accent-contrast: #fff;
  --shadow-card: 3px 3px 0 oklch(30% 0.04 290);
  --shadow-pop: 6px 6px 0 oklch(30% 0.04 290);
  --sidebar-bg: oklch(93% 0.05 160);
  --glass: none;
}
[data-skin="playful"][data-theme="dark"] {
  --bg: oklch(22% 0.04 290);
  --bg-sunken: oklch(18% 0.035 290);
  --surface: oklch(28% 0.05 290);
  --raised: oklch(33% 0.055 290);
  --text: oklch(96% 0.01 95);
  --text-2: oklch(76% 0.04 95);
  --text-3: oklch(58% 0.04 290);
  --border: oklch(60% 0.1 95);
  --accent: oklch(75% 0.17 80);
  --accent-soft: oklch(35% 0.07 80);
  --accent-contrast: oklch(22% 0.06 80);
  --shadow-card: 3px 3px 0 oklch(60% 0.1 95 / .7);
  --shadow-pop: 6px 6px 0 oklch(60% 0.1 95 / .7);
  --sidebar-bg: oklch(19% 0.045 310);
}

/* ============================================================
   基础
   ============================================================ */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  font-size: 14.5px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  transition: background .35s ease, color .35s ease;
}
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }
section[id] { scroll-margin-top: 84px; }
::selection { background: var(--accent-soft); }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; border: 2px solid var(--bg); }
::-webkit-scrollbar-track { background: transparent; }

/* ---------- 顶栏（含全局搜索） ---------- */
.header-bar {
  position: sticky; top: 0; z-index: 40;
  background: var(--sidebar-bg);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  border-bottom: var(--border-w) solid var(--border);
  transition: background .35s ease;
}
.header-inner { max-width: 1360px; margin: 0 auto; height: 60px; display: flex; align-items: center; gap: 12px; padding: 0 20px; }
.logo-mark {
  width: 34px; height: 34px; border-radius: var(--radius-sm); flex-shrink: 0;
  background: var(--accent); color: var(--accent-contrast);
  display: grid; place-items: center;
  font-family: var(--font-display); font-weight: 800; font-size: 17px;
  box-shadow: var(--shadow-card);
}
.brand-title { font-family: var(--font-display); font-weight: var(--display-weight); font-size: 16.5px; white-space: nowrap; }
.brand-sub { font-size: 10px; color: var(--text-3); letter-spacing: .12em; line-height: 1.2; }

.search-wrap { position: relative; margin-left: auto; width: min(340px, 34vw); }
.search-wrap > svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--text-3); pointer-events: none; }
.search-input {
  width: 100%; border-radius: 99px; padding: 8px 16px 8px 36px; font-size: 13.5px;
  border: var(--border-w) solid var(--border); background: var(--surface); color: var(--text);
  outline: none; transition: border-color .2s, box-shadow .2s;
}
.search-input::placeholder { color: var(--text-3); }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

.header-actions { display: flex; gap: 8px; flex-shrink: 0; position: relative; }

/* ---------- 通用控件（与 v1 一致） ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 15px; border-radius: var(--radius-sm);
  border: var(--border-w) solid var(--border);
  background: var(--surface); color: var(--text);
  font-size: 13.5px; font-weight: 600;
  transition: all .18s ease;
}
.btn:hover { box-shadow: var(--shadow-card); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn svg { width: 15px; height: 15px; }
.btn-primary { background: var(--accent); color: var(--accent-contrast); border-color: transparent; }
[data-skin="playful"] .btn-primary { border-color: var(--border); }
.btn-icon { padding: 8px; }
.btn-ghost { border-color: transparent; background: transparent; color: var(--text-2); }
.btn-ghost:hover { background: var(--surface); box-shadow: none; }

.input, .select {
  padding: 9px 13px; border-radius: var(--radius-sm);
  border: var(--border-w) solid var(--border);
  background: var(--surface); color: var(--text);
  font-size: 14px; width: 100%;
  outline: none; transition: border-color .18s ease, box-shadow .18s ease;
}
.input:focus, .select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.input::placeholder { color: var(--text-3); }

/* ---------- 布局：侧边栏 + 主区 ---------- */
.layout { max-width: 1360px; margin: 0 auto; display: flex; }
.sidebar {
  position: sticky; top: 60px; height: calc(100vh - 60px); width: 224px; flex-shrink: 0;
  background: var(--sidebar-bg);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  border-right: var(--border-w) solid var(--border);
  padding: 18px 12px 32px; overflow-y: auto;
  transition: background .35s ease;
}
.side-label { font-size: 11px; font-weight: 700; letter-spacing: .14em; color: var(--text-3); padding: 0 12px; margin: 18px 0 8px; }
.side-label:first-child { margin-top: 0; }
.nav-item {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 8px 12px; border-radius: var(--radius-sm);
  border: var(--border-w) solid transparent;
  background: transparent; color: var(--text-2);
  font-size: 14px; font-weight: 500; text-align: left;
  transition: all .18s ease; margin-bottom: 2px;
}
.nav-item:hover { background: var(--surface); color: var(--text); }
.nav-item.active {
  background: var(--surface); color: var(--accent);
  border-color: var(--border); box-shadow: var(--shadow-card);
  font-weight: 650;
}
.nav-item svg { width: 17px; height: 17px; flex-shrink: 0; }
.nav-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--text-3); transition: background .18s; }
.nav-item.active .nav-dot, .nav-item:hover .nav-dot { background: var(--accent); }
.nav-count { margin-left: auto; font-size: 11.5px; color: var(--text-3); font-variant-numeric: tabular-nums; }

.main { min-width: 0; flex: 1; padding: 28px 32px 64px; }

/* ---------- 问候区 ---------- */
.topbar { margin-bottom: 26px; }
.topbar h1 { font-family: var(--font-display); font-weight: var(--display-weight); font-size: 26px; line-height: 1.3; }
.topbar p { color: var(--text-3); font-size: 13px; margin-top: 2px; font-variant-numeric: tabular-nums; }

/* ---------- 区块标题（计数徽章 + 操作按钮） ---------- */
.section-head { display: flex; align-items: center; gap: 10px; margin: 0 0 14px; }
.section-title { font-family: var(--font-display); font-weight: var(--display-weight); font-size: 18px; display: flex; align-items: center; gap: 8px; }
.section-title svg { width: 18px; height: 18px; color: var(--accent); }
.badge-count {
  border-radius: 99px; border: var(--border-w) solid var(--border); background: var(--bg-sunken);
  color: var(--text-3); padding: 0 9px; font-size: 11.5px; font-weight: 600;
}
.section-actions { margin-left: auto; display: flex; gap: 8px; }

/* ---------- 收藏卡片（favicon + 名称 + 描述） ---------- */
.fav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(222px, 1fr)); gap: 13px; margin-bottom: 34px; }
.fav-card {
  position: relative; display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 15px; border-radius: var(--radius);
  border: var(--border-w) solid var(--border);
  background: var(--surface); text-decoration: none; color: inherit;
  box-shadow: var(--shadow-card);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
}
.fav-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-pop); border-color: var(--accent); }
.fav-avatar {
  width: 40px; height: 40px; border-radius: var(--radius-sm); flex-shrink: 0;
  display: grid; place-items: center; overflow: hidden;
  font-family: var(--font-display); font-weight: 800; font-size: 17px; color: #fff;
  transition: transform .2s ease;
}
.fav-card:hover .fav-avatar { transform: scale(1.08); }
.fav-avatar img { width: 24px; height: 24px; border-radius: 5px; }
.fav-body { min-width: 0; flex: 1; }
.fav-name-row { display: flex; align-items: center; gap: 5px; }
.fav-name { font-weight: 650; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color .18s; }
.fav-card:hover .fav-name { color: var(--accent); }
.fav-arrow { width: 13px; height: 13px; flex-shrink: 0; color: var(--text-3); transition: transform .2s, color .2s; }
.fav-card:hover .fav-arrow { transform: translate(2px, -2px); color: var(--accent); }
.fav-desc {
  margin-top: 2px; font-size: 12.5px; color: var(--text-3); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

.card-del {
  position: absolute; top: 8px; right: 8px; z-index: 2;
  width: 26px; height: 26px; border-radius: 8px;
  display: grid; place-items: center;
  border: none; background: var(--raised); color: var(--text-3);
  opacity: 0; transition: all .15s ease;
}
.fav-card:hover .card-del, .prompt-card:hover .card-del { opacity: 1; }
.card-del:hover { color: oklch(60% 0.22 25); background: var(--bg-sunken); }
.card-del svg { width: 13px; height: 13px; }

.fav-add {
  display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 70px;
  border: var(--border-w) dashed var(--border); border-radius: var(--radius);
  background: transparent; color: var(--text-3); font-size: 13px; font-weight: 600;
  transition: all .18s ease;
}
.fav-add:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
.fav-add svg { width: 18px; height: 18px; }

/* ---------- 提示词卡片 ---------- */
.prompt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); gap: 15px; }
.prompt-card {
  position: relative; display: flex; flex-direction: column; cursor: pointer;
  border-radius: var(--radius); overflow: hidden;
  border: var(--border-w) solid var(--border);
  background: var(--surface); box-shadow: var(--shadow-card);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
}
.prompt-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-pop); border-color: var(--accent); }
.prompt-cover { width: 100%; aspect-ratio: 16 / 9.5; object-fit: cover; display: block; background: var(--bg-sunken); }
.prompt-cover-placeholder {
  width: 100%; aspect-ratio: 16 / 9.5;
  display: grid; place-items: center;
  background: var(--accent-soft);
}
.prompt-cover-placeholder svg { width: 28px; height: 28px; color: var(--accent); }
.prompt-body { padding: 13px 15px 14px; display: flex; flex-direction: column; gap: 7px; flex: 1; }
.prompt-title { font-family: var(--font-display); font-weight: var(--display-weight); font-size: 14.5px; line-height: 1.45; }
.prompt-text {
  font-size: 12.5px; color: var(--text-3); line-height: 1.65;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.prompt-foot { display: flex; align-items: center; gap: 6px; margin-top: auto; padding-top: 4px; }
.tag-chip {
  border-radius: 99px; padding: 1px 9px; font-size: 11px; font-weight: 600;
  background: var(--accent-soft); color: var(--accent);
}
.prompt-copy {
  margin-left: auto; display: inline-flex; align-items: center; gap: 5px;
  border: var(--border-w) solid var(--border); border-radius: var(--radius-sm);
  padding: 4px 11px; font-size: 12px; font-weight: 600;
  background: transparent; color: var(--text-2);
  transition: all .18s;
}
.prompt-copy:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
.prompt-copy svg { width: 13px; height: 13px; }

/* ---------- 信息流 ---------- */
.feed-layout { display: grid; grid-template-columns: 1fr 290px; gap: 18px; align-items: start; }
@media (max-width: 1020px) { .feed-layout { grid-template-columns: 1fr; } }
.feed-list { display: flex; flex-direction: column; gap: 11px; }
.feed-card {
  display: flex; gap: 13px; align-items: flex-start;
  padding: 15px 18px; border-radius: var(--radius);
  border: var(--border-w) solid var(--border);
  background: var(--surface); box-shadow: var(--shadow-card);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  transition: transform .18s ease, box-shadow .18s ease;
}
.feed-card:hover { transform: translateX(3px); box-shadow: var(--shadow-pop); }
.feed-rank {
  font-family: var(--font-mono); font-size: 14px; font-weight: 700;
  color: var(--text-3); width: 24px; flex-shrink: 0; text-align: center; padding-top: 2px;
}
.feed-rank.hot { color: var(--accent); }
.feed-body { flex: 1; min-width: 0; }
.feed-title { font-weight: 600; font-size: 14px; line-height: 1.55; }
.feed-meta { display: flex; gap: 10px; margin-top: 5px; font-size: 11.5px; color: var(--text-3); flex-wrap: wrap; align-items: center; }
.feed-heat { font-family: var(--font-mono); font-size: 11.5px; color: var(--text-3); flex-shrink: 0; padding-top: 3px; }
.quote-card {
  padding: 20px; border-radius: var(--radius-lg);
  border: var(--border-w) solid var(--border);
  background: var(--surface); box-shadow: var(--shadow-card);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  position: sticky; top: 84px;
}
.quote-mark { font-family: var(--font-display); font-size: 40px; line-height: 1; color: var(--accent); display: block; }
.quote-text { font-family: var(--font-display); font-size: 15.5px; line-height: 1.85; margin: 6px 0 12px; }
.quote-from { font-size: 12px; color: var(--text-3); text-align: right; }

/* ---------- 工具箱 ---------- */
.tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 15px; }
.tool-card {
  padding: 19px; border-radius: var(--radius);
  border: var(--border-w) solid var(--border);
  background: var(--surface); box-shadow: var(--shadow-card);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  display: flex; flex-direction: column; gap: 13px;
  transition: box-shadow .2s ease, border-color .2s ease;
}
.tool-card:hover { box-shadow: var(--shadow-pop); }
.tool-head { display: flex; align-items: center; gap: 10px; }
.tool-head svg { width: 17px; height: 17px; color: var(--accent); }
.tool-head h3 { font-family: var(--font-display); font-weight: var(--display-weight); font-size: 15px; }
.tool-row { display: flex; gap: 8px; align-items: center; }
.tool-output {
  font-family: var(--font-mono); font-size: 13.5px;
  padding: 10px 13px; border-radius: var(--radius-sm);
  background: var(--bg-sunken); border: var(--border-w) solid var(--border);
  word-break: break-all; min-height: 42px;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  font-variant-numeric: tabular-nums;
}
.tool-label { font-size: 12px; color: var(--text-3); font-weight: 600; }
.range { accent-color: var(--accent); flex: 1; }
.stat-row { display: flex; gap: 9px; }
.stat-box {
  flex: 1; text-align: center; padding: 9px 6px;
  border-radius: var(--radius-sm); background: var(--bg-sunken);
  border: var(--border-w) solid var(--border);
}
.stat-num { font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--accent); }
.stat-lab { font-size: 11px; color: var(--text-3); margin-top: 1px; }
.color-swatch { width: 42px; height: 42px; border-radius: var(--radius-sm); border: var(--border-w) solid var(--border); flex-shrink: 0; }
.dice-result {
  font-family: var(--font-display); font-weight: var(--display-weight);
  font-size: 19px; text-align: center; padding: 16px 12px; min-height: 60px;
  border-radius: var(--radius-sm); background: var(--accent-soft); color: var(--accent);
  display: grid; place-items: center;
}

/* ---------- 弹窗 ---------- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: oklch(0% 0 0 / .4);
  display: grid; place-items: center; padding: 24px;
  animation: fadeIn .2s ease; overflow-y: auto;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
.modal {
  width: min(440px, 100%); max-height: calc(100vh - 80px); overflow-y: auto;
  background: var(--raised); border-radius: var(--radius-lg);
  border: var(--border-w) solid var(--border);
  box-shadow: var(--shadow-pop);
  padding: 24px;
  animation: popIn .25s cubic-bezier(.2,1.2,.4,1);
}
.modal.wide { width: min(600px, 100%); }
.modal h2 { font-family: var(--font-display); font-weight: var(--display-weight); font-size: 17px; margin-bottom: 16px; }
.form-field { margin-bottom: 14px; }
.form-field label { display: block; font-size: 12.5px; font-weight: 650; color: var(--text-2); margin-bottom: 6px; }
.form-hint { font-size: 11.5px; color: var(--text-3); margin-top: 4px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
.img-preview { width: 100%; max-height: 220px; object-fit: cover; border-radius: var(--radius-sm); border: var(--border-w) solid var(--border); display: block; }
.detail-cover { width: 100%; max-height: 320px; object-fit: cover; border-radius: var(--radius-sm); display: block; margin-bottom: 16px; }
.detail-text {
  font-size: 13.5px; line-height: 1.8; color: var(--text-2);
  background: var(--bg-sunken); border: var(--border-w) solid var(--border); border-radius: var(--radius-sm);
  padding: 14px 16px; white-space: pre-wrap; word-break: break-word;
}
@keyframes fadeIn { from { opacity: 0; } }
@keyframes popIn { from { opacity: 0; transform: scale(.93) translateY(8px); } }

/* ---------- 皮肤切换面板（顶栏弹出） ---------- */
.skin-panel {
  position: absolute; top: 46px; right: 0; z-index: 45; width: 190px;
  background: var(--raised); border: var(--border-w) solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-pop);
  padding: 10px; animation: popIn .22s cubic-bezier(.2,1.2,.4,1);
}
.skin-option {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 8px 10px; border-radius: var(--radius-sm);
  border: var(--border-w) solid transparent; background: transparent;
  color: var(--text-2); font-size: 13px; font-weight: 600; text-align: left;
  transition: all .15s ease;
}
.skin-option:hover { background: var(--bg-sunken); color: var(--text); }
.skin-option.active { color: var(--accent); border-color: var(--border); background: var(--accent-soft); }
.skin-dot { width: 15px; height: 15px; border-radius: 50%; flex-shrink: 0; border: 2px solid var(--border); }

/* ---------- Toast / 空状态 / 回到顶部 ---------- */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 60;
  padding: 10px 20px; border-radius: 99px;
  background: var(--text); color: var(--bg);
  font-size: 13px; font-weight: 600;
  box-shadow: var(--shadow-pop);
  display: flex; align-items: center; gap: 8px;
  animation: toastIn .3s cubic-bezier(.2,1.2,.4,1);
}
.toast svg { width: 14px; height: 14px; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(16px); } }

.empty-state {
  text-align: center; padding: 48px 20px;
  border: var(--border-w) dashed var(--border); border-radius: var(--radius);
}
.empty-state .empty-icon {
  width: 56px; height: 56px; margin: 0 auto 12px; border-radius: var(--radius);
  display: grid; place-items: center;
  background: var(--accent-soft); color: var(--accent);
}
.empty-state .empty-icon svg { width: 24px; height: 24px; }
.empty-state p { color: var(--text-3); font-size: 13.5px; }

.back-top {
  position: fixed; bottom: 24px; right: 24px; z-index: 45;
  width: 42px; height: 42px; border-radius: 99px;
  display: grid; place-items: center;
  background: var(--surface); border: var(--border-w) solid var(--border); color: var(--text-2);
  backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
  box-shadow: var(--shadow-pop);
  transition: opacity .3s, transform .3s;
}
.back-top:hover { transform: scale(1.08); color: var(--accent); }
.back-top.hidden { opacity: 0; pointer-events: none; transform: translateY(12px); }
.back-top svg { width: 18px; height: 18px; }

/* ---------- 响应式 ---------- */
@media (max-width: 860px) {
  .sidebar { display: none; }
  .main { padding: 20px 16px 48px; }
  .brand-title { font-size: 15px; }
  .brand-sub { display: none; }
  .search-wrap { width: 100%; }
}
</style>
